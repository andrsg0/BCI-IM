# ============================================================
# Configuración para Dreyer2023 (GIPSA-lab, Francia).
# Dataset GRANDE para ENTRENAR el pooled cross-subject: 87 sujetos,
# 2 clases nativas (mano izq./der.), 27 canales, 512 Hz, ~240 trials/sujeto.
# 1 sola sesión (6 runs) -> bueno para entrenar, NO para "otro día" en vivo.
# El fs NO se fija aquí: el pipeline lo toma de los datos (fs dinámico).
# ============================================================

dataset:
  name: "Dreyer2023"
  subjects: [1]
  classes: ["left_hand", "right_hand"]   # binario, comparable con el 2a

epoching:
  # interval del dataset = [0, 5]: el cue de imaginación arranca en el onset
  # de la anotación y dura ~5 s. Epocamos esa ventana completa.
  tmin: 0.0
  tmax: 5.0
  picks: "eeg"           # 27 canales EEG
  baseline: null

# Ventana de imaginación activa: recorta el transitorio del cue y el borde del
# FIR. [0.5, 2.5] s = 2 s, coherente con los demás datasets y con streaming.
classification_window:
  tmin_rel: 0.5
  tmax_rel: 2.5

# FIR pasa-banda µ/β. fs se sobreescribe con el real del dataset (512 Hz).
fir_filter:
  low_hz: 8.0
  high_hz: 30.0
  num_taps: 101
  window: "hamming"
  fs: 512                # solo informativo/fallback; manda el fs de los datos

csp:
  n_components: 4
  log_variance: true
  shrinkage: 0.0         # 27 canales y muchos trials/sujeto: no hace falta regularizar

# Banda de entrada para EEGNet. Por defecto sería 4–40 Hz, pero Dreyer2023 tiene un
# artefacto fuera de la banda MI (4–13 Hz) al que EEGNet se sobreajusta y colapsa a
# 0.50. Restringir a beta (13–30 Hz) lo rescata (S3: 0.44 → 0.85; CSP da 0.89).
# Ver _eegnet_features() y la memoria 'eegnet-falla-en-dreyer'. No afecta a CSP+LDA.
eegnet:
  band_low: 13.0
  band_high: 30.0

classifier:
  type: "lda"
  cv_folds: 5

streaming:
  window_s: 2.0
  step_s: 0.1
  realtime_factor: 1.0

paths:
  raw: "data/raw"
  processed: "data/processed"
