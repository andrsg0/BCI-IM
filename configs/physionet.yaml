# ============================================================
# Configuración para PhysioNet EEG Motor Movement/Imagery (MMI)
# Segundo dataset. Difiere del 2a: fs=160 Hz, 64 canales, 1 sesión,
# y la imaginación empieza en el onset de la anotación (interval [0,3]).
# El fs NO se fija aquí: el pipeline lo toma de los datos (fs dinámico).
# ============================================================

dataset:
  name: "PhysionetMI"
  subjects: [1]
  classes: ["left_hand", "right_hand"]   # binario, comparable con el 2a

epoching:
  # En PhysioNet el cue de imaginación coincide con el onset de la anotación,
  # y la tarea dura ~3 s -> interval del dataset = [0, 3].
  tmin: 0.0
  tmax: 3.0
  picks: "eeg"           # 64 canales EEG (se descarta el canal STIM)
  baseline: null

# Ventana de imaginación activa: recorta el transitorio inicial del cue
# y el borde del FIR. [0.5, 2.5] s = 2 s (a 160 Hz = 320 muestras).
classification_window:
  tmin_rel: 0.5
  tmax_rel: 2.5

# FIR pasa-banda µ/β. fs se sobreescribe con el real del dataset (160 Hz).
fir_filter:
  low_hz: 8.0
  high_hz: 30.0
  num_taps: 101
  window: "hamming"
  fs: 160                # solo informativo/fallback; manda el fs de los datos

csp:
  n_components: 4
  log_variance: true
  shrinkage: 0.0         # regularización de covarianza [0,1]; útil aquí (64 canales, ~45 trials)

classifier:
  type: "lda"
  cv_folds: 5

streaming:
  window_s: 2.0
  step_s: 0.1
  realtime_factor: 1.0

paths:
  raw: "data/raw"
  processed: "data/processed"
